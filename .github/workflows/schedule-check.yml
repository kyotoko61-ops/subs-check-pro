name: 定时订阅检查 (Subs-Check-PRO)

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  check-subs:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 subs-check-pro
        id: download
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/kyotoko61-ops/subs-check-pro/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "最新版本: $LATEST_VERSION"
          DOWNLOAD_URL="https://github.com/kyotoko61-ops/subs-check-pro/releases/download/${LATEST_VERSION}/subs-check-pro-linux-amd64"
          echo "下载地址: $DOWNLOAD_URL"
          curl -L -o subs-check-pro $DOWNLOAD_URL
          chmod +x subs-check-pro
          echo "version=${LATEST_VERSION}" >> $GITHUB_OUTPUT

      - name: 准备配置
        run: |
          mkdir -p ./config
          # 确保仓库根目录有 config.yaml 文件
          cp ./config.yaml ./config/config.yaml

      - name: 执行检测
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          ./subs-check-pro -f ./config/config.yaml

      - name: 列出输出文件
        run: |
          ls -la ./output/ || echo "输出目录不存在"

      - name: 推送结果到 Gist
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          OUTPUT_DIR="./output"
          FILE_TO_UPLOAD="result.yaml"  # 请根据实际输出文件名修改
          if [ ! -f "$OUTPUT_DIR/$FILE_TO_UPLOAD" ]; then
            echo "文件 $FILE_TO_UPLOAD 不存在，尝试查找其他文件..."
            FIRST_FILE=$(find $OUTPUT_DIR -type f | head -n 1)
            if [ -z "$FIRST_FILE" ]; then
              echo "没有找到输出文件，跳过推送"
              exit 0
            fi
            FILE_TO_UPLOAD=$(basename "$FIRST_FILE")
            OUTPUT_DIR=$(dirname "$FIRST_FILE")
          fi
          echo "准备上传文件: $OUTPUT_DIR/$FILE_TO_UPLOAD"
          curl -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/gists/$GIST_ID \
            -d "{\"files\":{\"$FILE_TO_UPLOAD\":{\"content\": $(jq -Rs . < $OUTPUT_DIR/$FILE_TO_UPLOAD)}}}"
          echo "✅ 已更新 Gist 中的 $FILE_TO_UPLOAD"
